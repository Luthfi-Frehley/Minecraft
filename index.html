<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Minecraft Clone 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="crosshair">+</div>

    <div id="hotbar">
        <div class="slot active" data-type="grass"><img src="texture/Tanah_Samping.png" alt="Grass">1</div>
        <div class="slot" data-type="dirt"><img src="texture/Tanah.png" alt="Dirt">2</div>
        <div class="slot" data-type="stone"><img src="texture/Batu.png" alt="Stone">3</div>
        <div class="slot" data-type="wood"><img src="texture/Kayu_Samping.png" alt="Log">4</div>
        <div class="slot" data-type="leaves"><img src="texture/Daun.png" alt="Leaves">5</div>
        <div class="slot" data-type="sand"><img src="texture/Pasir.png" alt="Sand">6</div>
        <div class="slot" data-type="grass">7</div>
        <div class="slot" data-type="grass">8</div>
        <div class="slot" data-type="grass">9</div>
    </div>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
